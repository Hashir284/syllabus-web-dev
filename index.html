<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Stack Roadmap 2026</title>
<link rel="shortcut icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: 'Poppins', sans-serif;
background: linear-gradient(135deg,#0f172a,#020617);
color:white;
padding:40px;
}

h1{
text-align:center;
margin-bottom:50px;
font-size:40px;
letter-spacing:1px;
}

.phase{
margin-bottom:40px;
background:#020617;
padding:25px;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.phase h2{
background:#1e293b;
padding:12px;
border-radius:8px;
font-size:22px;
letter-spacing:0.5px;
}

.topic{
margin-top:20px;
}

.topic h3{
color:#38bdf8;
margin-bottom:8px;
font-size:20px;
font-weight:500;
}

ul{
list-style:none;
padding:0;
}

li{
background:#0f172a;
margin:6px 0;
padding:10px 12px;
border-radius:6px;
cursor:pointer;
transition:all .25s ease;
border:1px solid transparent;
font-size:16px;
}

li:hover{
background:#1e293b;
border:1px solid #38bdf8;
transform:translateX(4px);
}

.done{
background:#16a34a;
text-decoration:line-through;
border:none;
}

</style>
</head>

<body>

<h1>Full Stack Developer Roadmap (2026)</h1>

<div id="roadmap"></div>

<script>

let roadmap = {

"PHASE 1 — FRONTEND DEVELOPMENT":{

"HTML5":[
"Semantic HTML", "Forms & Inputs", "SEO Basics", "Links, Videos & Images", "Lists & Tables"
],

"CSS": ["Box Model", "Flexbox", "Grid", "Responsive Design", "Transitions & Animations", "Pseudo-classes & Pseudo-elements", "Tailwind CSS"],


"JavaScript DOM":[
    "DOM Manipulation",
    "Events",
    "Fetch API",
    "Async / Await",
    "Promises"
], 

"Programming Fundamentals (JavaScript)":[
    "Variables",
    "Data Types",
    "Operators",
    "Conditionals",
"Loops",
"Functions",
"Arrays",
"Objects",
"Error Handling",
"Arrow Functions",
"Destructuring",
"Spread / Rest",
"Modules"
],

"Git & Version Control":[
"Git Basics",
"GitHub",
"Branching",
"Pull Requests",
"Merge Conflicts"
],

"Tailwind CSS":[
"Utility Classes",
"Responsive Layouts",
"Component Styling"
],
},

"PHASE 2 — INTERNET & PROGRAMMING BASICS":{

"How the Internet Works":[
"HTTP / HTTPS",
"DNS",
"Browser Rendering",
"Client vs Server"
],

},

"PHASE 3 — ADVANCED FRONTEND":{

"React.js":[
"Components",
"JSX",
"Props",
"State",
"useState",
"useEffect",
"useContext",
"Component Lifecycle"
],

"Advanced React":[
"Custom Hooks",
"Performance Optimization",
"Code Splitting",
"Lazy Loading"
],

"Next.js":[
"App Router",
"Server Components",
"API Routes",
"Static Generation",
"Server Side Rendering"
],

"UI Libraries":[
"shadcn/ui",
"Radix UI",
"Component Design"
]

},

"PHASE 4 — BACKEND DEVELOPMENT":{

"Node.js":[
"Event Loop",
"Modules",
"File System",
"Streams"
],

"Express.js":[
"Routing",
"Middleware",
"REST APIs",
"Error Handling"
],

"Authentication":[
"JWT",
"OAuth",
"Sessions",
"Cookies"
]

},

"PHASE 5 — DATABASES":{

"MongoDB":[
"Documents",
"Collections",
"CRUD Operations",
"Indexing",
"Aggregation"
],

"SQL (PostgreSQL)":[
"Tables",
"Relationships",
"Joins",
"Queries",
"Indexing"
],

"ORM":[
"Prisma",
"Mongoose"
]

},

"PHASE 6 — API DEVELOPMENT":{

"API Development":[
"REST API Design",
"API Security",
"Rate Limiting",
"API Documentation",
"GraphQL Basics"
]

},

"PHASE 7 — DEVOPS & CLOUD":{

"DevOps":[
"Linux Basics",
"Docker",
"CI/CD Pipelines",
"Deployment"
],

"Platforms":[
"Vercel",
"AWS",
"DigitalOcean"
],

"Concepts":[
"Load Balancing",
"CDN",
"Reverse Proxy"
]

},

"PHASE 8 — SYSTEM DESIGN":{

"System Design":[
"Scalability",
"Caching",
"Microservices",
"Message Queues",
"Database Scaling"
],

"Tools":[
"Redis",
"Kafka"
]

},

"PHASE 9 — TESTING":{

"Testing":[
"Unit Testing",
"Integration Testing",
"End-to-End Testing"
],

"Tools":[
"Jest",
"Cypress",
"Playwright"
]

},

"PHASE 10 — JOB READY SKILLS":{

"Data Structures & Algorithms":[
"Arrays",
"Strings",
"Linked List",
"Stack",
"Queue",
"Trees",
"Graphs"
],

"System Design":[
"System Design Basics"
],

"Portfolio Projects":[
"SaaS Application",
"E-commerce Website",
"Social Media App",
"AI Integrated App"
],

"Deployment":[
"Production Apps",
"Domain + Hosting"
],

"Freelancing & Job":[
"GitHub Portfolio",
"Resume",
"LinkedIn",
"Technical Interviews"
]

}

}


let saved = JSON.parse(localStorage.getItem("roadmapProgress")) || {}

let container = document.getElementById("roadmap")

for(let phase in roadmap){

let phaseDiv = document.createElement("div")
phaseDiv.className="phase"

let h2 = document.createElement("h2")
h2.innerText = phase

phaseDiv.appendChild(h2)

for(let topic in roadmap[phase]){

let topicDiv = document.createElement("div")
topicDiv.className="topic"

let h3 = document.createElement("h3")
h3.innerText = topic

let ul = document.createElement("ul")

roadmap[phase][topic].forEach(task=>{

let li = document.createElement("li")
li.innerText = task

if(saved[task]){
li.classList.add("done")
}

li.onclick=function(){

saved[task] = !saved[task]

localStorage.setItem("roadmapProgress",JSON.stringify(saved))

li.classList.toggle("done")

}

ul.appendChild(li)

})

topicDiv.appendChild(h3)
topicDiv.appendChild(ul)

phaseDiv.appendChild(topicDiv)

}

container.appendChild(phaseDiv)

}

</script>
</body>
<!-- "Projects": ["To-do App", "API Fetcher", "Calculator", "Mini Games", "Form Validation"] -->

</html>
